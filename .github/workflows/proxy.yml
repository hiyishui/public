name: SS Proxy

on:
  workflow_dispatch:

jobs:
  proxy:
    runs-on: ubuntu-latest
    steps:
      - name: Install V2Ray
        run: |
          curl -L https://raw.githubusercontent.com/v2fly/fhs-install-v2ray/master/install-release.sh | sudo bash

      - name: Configure V2Ray
        run: |
          python3 << EOF
          import json, os
          config = {
            "inbounds": [{
              "port": 8080,
              "protocol": "vmess",
              "settings": {
                "clients": [{"id": "${{ secrets.V2RAY_UUID }}"}]
              },
              "streamSettings": {
                "network": "ws",
                "wsSettings": {"path": "/v2ray"}
              }
            }],
            "outbounds": [{"protocol": "freedom"}]
          }
          with open("/tmp/v2ray_config.json", "w") as f:
            json.dump(config, f, indent=2)
          EOF
          sudo cp /tmp/v2ray_config.json /usr/local/etc/v2ray/config.json
          echo "=== V2Ray config ==="
          cat /usr/local/etc/v2ray/config.json

      - name: Start V2Ray
        run: |
          sudo systemctl start v2ray
          sleep 3
          sudo systemctl status v2ray
          echo "=== V2Ray listening ==="
          ss -tlnp | grep 8080 || echo "WARNING: port 8080 not listening"

      - name: Start HTTP tunnel
        run: |
          ssh -o StrictHostKeyChecking=no \
              -o ServerAliveInterval=60 \
              -R 80:localhost:8080 \
              nokey@localhost.run > /tmp/tunnel.log 2>&1 &
          sleep 10

          echo "=== tunnel log ==="
          cat /tmp/tunnel.log

          HOST=$(grep -oP '[a-z0-9\-]+\.lhr\.life' /tmp/tunnel.log | head -1)
          echo "HOST=$HOST"
          echo "HOST=$HOST" >> $GITHUB_ENV

      - name: Send email notification
        run: |
          python3 << EOF
          import smtplib
          from email.mime.text import MIMEText

          host = "${{ env.HOST }}"

          body = f"""V2Ray 代理已启动

          请更新 ClashX config.yaml 中的 server 字段：

          server: {host}

          其余配置（port/uuid/path）不变。
          有效期 6 小时，到期后重新触发 workflow 并更新 server。
          """

          msg = MIMEText(body)
          msg["Subject"] = "✅ V2Ray 代理已启动"
          msg["From"] = "${{ secrets.MAIL_USER }}"
          msg["To"] = "${{ secrets.MAIL_USER }}"

          with smtplib.SMTP_SSL("smtp.163.com", 465) as server:
              server.login("${{ secrets.MAIL_USER }}", "${{ secrets.MAIL_PASSWORD }}")
              server.send_message(msg)

          print("邮件发送成功")
          EOF

      - name: Keep alive (6 hours)
        run: sleep 21600