name: SS Proxy

on:
  workflow_dispatch:

jobs:
  proxy:
    runs-on: ubuntu-latest
    steps:
      - name: Install Shadowsocks
        run: sudo apt-get install -y shadowsocks-libev

      - name: Configure Shadowsocks
        run: |
          sudo tee /etc/shadowsocks-libev/config.json > /dev/null << EOF
          {
            "server": "0.0.0.0",
            "server_port": 8388,
            "password": "${{ secrets.SS_PASSWORD }}",
            "method": "chacha20-ietf-poly1305"
          }
          EOF

      - name: Start Shadowsocks
        run: sudo systemctl start shadowsocks-libev

      - name: Start tunnel & get address
        run: |
          ssh -o StrictHostKeyChecking=no \
              -o ServerAliveInterval=60 \
              -R 8388:localhost:8388 \
              nokey@localhost.run > /tmp/tunnel.log 2>&1 &
          sleep 10

          echo "=== tunnel log ==="
          cat /tmp/tunnel.log

          # 尝试多种格式匹配
          TUNNEL_LINE=$(grep -oP '[a-z0-9\-]+\.lhr\.life:\d+' /tmp/tunnel.log | head -1)
          echo "=== matched line: $TUNNEL_LINE ==="

          HOST=$(echo $TUNNEL_LINE | cut -d: -f1)
          PORT=$(echo $TUNNEL_LINE | cut -d: -f2)

          echo "HOST=$HOST"
          echo "PORT=$PORT"

          echo "HOST=$HOST" >> $GITHUB_ENV
          echo "PORT=$PORT" >> $GITHUB_ENV

      - name: Send email notification
        run: |
          python3 << EOF
          import smtplib
          from email.mime.text import MIMEText

          host = "${{ env.HOST }}"
          port = "${{ env.PORT }}"
          password = "${{ secrets.SS_PASSWORD }}"

          body = f"server: {host}\nport: {port}\npassword: {password}"

          msg = MIMEText(body)
          msg["Subject"] = "✅ Shadowsocks 代理已启动"
          msg["From"] = "${{ secrets.MAIL_USER }}"
          msg["To"] = "${{ secrets.MAIL_USER }}"

          with smtplib.SMTP_SSL("smtp.163.com", 465) as server:
              server.login("${{ secrets.MAIL_USER }}", "${{ secrets.MAIL_PASSWORD }}")
              server.send_message(msg)

          print("邮件发送成功")
          EOF

      - name: Keep alive (6 hours)
        run: sleep 21600